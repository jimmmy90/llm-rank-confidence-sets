name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # mrsw.py + test_mrsw.py only need numpy (no API keys, no heavy deps).
      - run: pip install numpy
      - run: python test_mrsw.py
